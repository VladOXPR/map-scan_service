<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>CUUB Map</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />
    <!-- Inter font (SIL OFL, safe to host/redistribute) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            height: 100%;
            width: 100%;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            height: 100%;
            min-height: 100%;
            width: 100%;
        }
        #map {
            width: 100%;
            height: 100%;
            min-height: 100%;
        }

        /* "Find nearest station" button overrides (injected by lib/nearest_feature.js) */
        body .cuub-nearest-button {
            background-color: #0099FF;
            color: #ffffff;
            border: 1px solid transparent;
            border-radius: 24px;
            padding: 12px 20px;
            font-size: 16px;
            line-height: 1.4;
            font-weight: 600;
        }

        body .cuub-nearest-button:hover {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            transform: none;
        }

        body .cuub-nearest-button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="lib/geo.js"></script>
    <script src="lib/nearest_feature.js"></script>
    <script src="map_blank.js"></script>
</body>
</html>
